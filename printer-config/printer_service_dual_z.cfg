#####################################################################
# CUSTOM COREXY - SKR 1.4 / SKR 1.4 TURBO
# SERVICE LEVELING MODE
# WORKING DRIVER SLOTS: X, Y, Z, E1
#
# DRIVER USAGE:
# X  -> stepper_x
# Y  -> stepper_y
# Z  -> left Z motor
# E1 -> right Z motor as stepper_z1
#
# IMPORTANT:
# - Extruder motor must be unplugged from E1 in this mode
# - Second Z motor must be plugged into E1
# - This mode is for gantry leveling only
# - Do NOT try to print in this mode
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_lpc1768_29800110A980DF953E6EAD62C02000F5-if00

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 15
max_z_accel: 200
square_corner_velocity: 5.0

#####################################################################
# X STEPPER
#####################################################################

[stepper_x]
step_pin: P2.2
dir_pin: P2.6
enable_pin: !P2.1
microsteps: 16
rotation_distance: 40
endstop_pin: P1.29
position_endstop: 0
position_max: 300
homing_speed: 50

[tmc2208 stepper_x]
uart_pin: P1.10
run_current: 0.80
hold_current: 0.50
stealthchop_threshold: 999999

#####################################################################
# Y STEPPER
#####################################################################

[stepper_y]
step_pin: P0.19
dir_pin: P0.20
enable_pin: !P2.8
microsteps: 16
rotation_distance: 40
endstop_pin: P1.28
position_endstop: 0
position_max: 300
homing_speed: 50

[tmc2208 stepper_y]
uart_pin: P1.9
run_current: 0.80
hold_current: 0.50
stealthchop_threshold: 999999

#####################################################################
# Z LEFT MOTOR ON Z DRIVER
#####################################################################

[stepper_z]
step_pin: P0.22
dir_pin: P2.11
enable_pin: !P0.21
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 300
position_min: -3
homing_speed: 10
second_homing_speed: 3

[tmc2208 stepper_z]
uart_pin: P1.8
run_current: 0.65
hold_current: 0.40
stealthchop_threshold: 999999

#####################################################################
# Z RIGHT MOTOR ON E1 DRIVER
# E1 SOCKET TEMPORARILY USED AS Z1
#####################################################################

[stepper_z1]
step_pin: P1.15
dir_pin: P1.14
enable_pin: !P1.16
microsteps: 16
rotation_distance: 8

[tmc2208 stepper_z1]
uart_pin: P1.1
run_current: 0.65
hold_current: 0.40
stealthchop_threshold: 999999

#####################################################################
# BED
#####################################################################

[heater_bed]
heater_pin: P2.5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.25
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

#####################################################################
# FANS
#####################################################################

# Part cooling fan
[fan]
pin: P2.3

# Hotend heatsink fan
# Still left here because hotend may still get warm physically
[heater_fan hotend_fan]
pin: P2.4
heater: heater_bed
heater_temp: 50.0

#####################################################################
# BLTOUCH
#####################################################################

[bltouch]
sensor_pin: ^P0.10
control_pin: P2.0
x_offset: -42
y_offset: -10
z_offset: 0
speed: 10
samples: 2
sample_retract_dist: 5.0
stow_on_each_sample: True
pin_up_reports_not_triggered: True
pin_up_touch_mode_reports_triggered: False
probe_with_touch_mode: False

[safe_z_home]
home_xy_position: 150,150
speed: 80
z_hop: 10
z_hop_speed: 15

#####################################################################
# BED MESH
#####################################################################

[bed_mesh]
speed: 100
horizontal_move_z: 8
mesh_min: 20,20
mesh_max: 258,290
probe_count: 5,5
algorithm: bicubic
fade_start: 1
fade_end: 10

#####################################################################
# DUAL Z TILT
#####################################################################

[z_tilt]
z_positions:
    0,150
    300,150
points:
    40,150
    290,150
speed: 80
horizontal_move_z: 8
retries: 5
retry_tolerance: 0.02

#####################################################################
# VIRTUAL SD / STATUS / PAUSE
#####################################################################

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]

[pause_resume]

#####################################################################
# Z OFFSET CALIBRATION BUTTON
#####################################################################

[gcode_macro CALIBRATE_Z_OFFSET]
description: Start full Z offset calibration (auto + manual paper tuning)
gcode:
    M117 Z Offset Calibration...
    
    # Heat for real conditions (optional but recommended)
    # M140 S60
    # M104 S150
    # M190 S60
    # M109 S150

    # Clear mesh (important)
    BED_MESH_CLEAR

    # Home all axes
    G28

    # Move to safe center
    G90
    G1 X150 Y150 F6000

    # Start probe calibration
    PROBE_CALIBRATE


#####################################################################
# timelapse
#####################################################################
[include timelapse.cfg]


#####################################################################
# SERVICE MACROS
#####################################################################

[gcode_macro SERVICE_GANTRY_LEVEL]
gcode:
    G90
    BED_MESH_CLEAR
    G28
    Z_TILT_ADJUST
    G28 Z

[gcode_macro END_SERVICE]
gcode:
    M400